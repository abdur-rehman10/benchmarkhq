name: 'BenchmarkHQ Check'
description: 'Check your website features against industry benchmarks from BenchmarkHQ'
branding:
  icon: 'check-circle'
  color: 'orange'

inputs:
  industry:
    description: 'Industry key (e.g., ecommerce_usa, crm, news_uk)'
    required: true
  features:
    description: 'Comma-separated features your site has'
    required: true
  fail_below:
    description: 'Fail if score below this (0-100, default 0 = never fail)'
    required: false
    default: '0'
  api_url:
    description: 'BenchmarkHQ API URL'
    required: false
    default: 'https://api.benchmarkhq.site'

runs:
  using: 'composite'
  steps:
    - name: BenchmarkHQ Check
      shell: python3 {0}
      run: |
        import json, sys, urllib.request, urllib.error

        api_url = "${{ inputs.api_url }}"
        industry = "${{ inputs.industry }}"
        features_raw = "${{ inputs.features }}"
        fail_below = int("${{ inputs.fail_below }}" or "0")

        # Parse features from comma-separated string
        features = [f.strip() for f in features_raw.split(",") if f.strip()]

        # Call the API
        payload = json.dumps({"industry": industry, "features": features}).encode()
        req = urllib.request.Request(
            f"{api_url}/check",
            data=payload,
            headers={"Content-Type": "application/json"}
        )

        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                raw = resp.read().decode()
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"::error::API returned {e.code}: {body[:300]}")
            sys.exit(1)
        except Exception as e:
            print(f"::error::Failed to reach API: {e}")
            sys.exit(1)

        # Parse JSON response
        try:
            data = json.loads(raw)
        except json.JSONDecodeError:
            print(f"::error::API returned invalid JSON: {raw[:300]}")
            sys.exit(1)

        # Handle error responses
        if isinstance(data, str):
            print(f"::error::API returned string instead of JSON object: {data[:300]}")
            sys.exit(1)

        if "detail" in data:
            print(f"::error::API error: {data['detail']}")
            sys.exit(1)

        score = data.get("score", 0)
        met = data.get("met", [])
        missing = data.get("missing", [])
        total = data.get("total_features", len(met) + len(missing))

        # Display results
        print(f"\n{'='*50}")
        print(f"BenchmarkHQ: {industry}")
        print(f"Score: {score}/100 ({len(met)}/{total} features)")
        print(f"{'='*50}")

        if met:
            print(f"\n✅ Met ({len(met)}):")
            for f in met[:20]:
                name = f if isinstance(f, str) else (f.get("feature") or f.get("id") or str(f))
                print(f"  • {name}")
            if len(met) > 20:
                print(f"  ... +{len(met)-20} more")

        if missing:
            print(f"\n❌ Missing ({len(missing)}):")
            for f in missing[:15]:
                if isinstance(f, str):
                    print(f"  • {f}")
                elif isinstance(f, dict):
                    name = f.get("feature") or f.get("id") or "unknown"
                    cls = f.get("classification", "")
                    pct = f.get("percentage", "")
                    info = f" ({cls}, {pct}%)" if cls else ""
                    print(f"  • {name}{info}")
            if len(missing) > 15:
                print(f"  ... +{len(missing)-15} more")

        print(f"\n📊 {api_url}/benchmark/{industry}")
        print(f"Powered by BenchmarkHQ\n")

        # Threshold check
        if fail_below > 0 and score < fail_below:
            print(f"::error::Score {score} is below threshold {fail_below}")
            sys.exit(1)

        # Set outputs
        import os
        gh_output = os.environ.get("GITHUB_OUTPUT", "")
        if gh_output:
            with open(gh_output, "a") as f:
                f.write(f"score={score}\n")
                f.write(f"met_count={len(met)}\n")
                f.write(f"missing_count={len(missing)}\n")
